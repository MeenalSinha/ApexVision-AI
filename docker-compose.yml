version: "3.9"

# ─────────────────────────────────────────────────────────────
#  ApexVision AI — Production Docker Compose
# ─────────────────────────────────────────────────────────────

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:

  # ── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: apexvision_postgres
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB:       apexvision
      POSTGRES_USER:     apexvision
      POSTGRES_PASSWORD: ${DB_PASSWORD:-apexvision_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apexvision"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ─────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: apexvision_redis
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  # ── FastAPI Backend ───────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apexvision_backend
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL:         postgresql://apexvision:${DB_PASSWORD:-apexvision_secret}@postgres:5432/apexvision
      REDIS_URL:            redis://redis:6379
      IBM_WATSONX_URL:      ${IBM_WATSONX_URL:-https://us-south.ml.cloud.ibm.com}
      IBM_WATSONX_API_KEY:  ${IBM_WATSONX_API_KEY:-}
      IBM_PROJECT_ID:       ${IBM_PROJECT_ID:-}
      IBM_GRANITE_MODEL:    ${IBM_GRANITE_MODEL:-ibm/granite-13b-instruct-v2}
      UPLOAD_DIR:           /app/uploads
      OUTPUT_DIR:           /app/outputs
      DEBUG:                ${DEBUG:-false}
      SECRET_KEY:           ${SECRET_KEY:-change-in-production}
    volumes:
      - uploads_data:/app/uploads
      - outputs_data:/app/outputs
      - models_cache:/app/models
      - chromadb_data:/app/data/chromadb
      - docling_data:/app/data/docling_parsed
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── Next.js Frontend ──────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apexvision_frontend
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL:  ${PUBLIC_WS_URL:-ws://localhost:8000}
      BACKEND_URL:         http://backend:8000
    depends_on:
      backend: { condition: service_healthy }
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 60s

  # ── LangFlow ──────────────────────────────────────────────────
  langflow:
    image: langflowai/langflow:latest
    container_name: apexvision_langflow
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "7860:7860"
    environment:
      LANGFLOW_DATABASE_URL: postgresql://apexvision:${DB_PASSWORD:-apexvision_secret}@postgres:5432/langflow
      LANGFLOW_SECRET_KEY:   ${LANGFLOW_SECRET:-apexvision-langflow}
      LANGFLOW_AUTO_LOGIN:   "true"
    volumes:
      - langflow_data:/app/langflow
      - ./ai_pipelines/langflow:/app/langflow/flows:ro
    depends_on:
      postgres: { condition: service_healthy }

  # ── Nginx ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: apexvision_nginx
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      frontend: { condition: service_started }
      backend:  { condition: service_healthy }

volumes:
  postgres_data:
  uploads_data:
  outputs_data:
  models_cache:
  chromadb_data:
  docling_data:
  langflow_data:

networks:
  default:
    name: apexvision_net
    driver: bridge
